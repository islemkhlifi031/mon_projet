<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Islem khlifi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .contact-form-wrapper {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
        }
        
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <span class="logo-icon">✨</span>
                    <span class="logo-text">Islem<span>Khlifi</span></span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><span class="nav-icon">🏠</span> Accueil</a></li>
                <li><a href="about.html"><span class="nav-icon">📖</span> À propos</a></li>
                <li><a href="contact.html" class="active"><span class="nav-icon">📧</span> Contact</a></li>
            </ul>
            <div class="nav-toggle">☰</div>
        </div>
    </nav>

    <main class="main-content">
        <div class="hero-section" style="padding-top: 100px;">
            <div class="hero-badge">
                <span class="badge-pulse">●</span> Contactez-nous
            </div>
            <h1 class="hero-title">
                Envoyez-nous<br>
                <span class="gradient-text">un message</span>
            </h1>
            <p class="hero-subtitle">
                Nous vous répondrons dans les plus brefs délais
            </p>
        </div>

        <div class="contact-form-wrapper">
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" name="nom" placeholder="Votre nom" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="votre@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="5" placeholder="Votre message..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">
                    ✨ Envoyer le message ✨
                </button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <p style="color: rgba(255, 255, 255, 0.5);">📧 contact@islem.com | 📞 +213 55 55 55 55</p>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p><a href="index.html" style="color: var(--primary); text-decoration: none;">← Retour à l'accueil</a></p>
            <p>&copy; 2026 Islem Khlifi - Designé avec <span class="heart">❤️</span></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
